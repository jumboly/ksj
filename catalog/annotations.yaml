      - transportation
  N06:
    description: "高速道路の整備時系列データ。高速道路ネットワークの発展分析に用いる。"
    use_cases:
      - transportation
  N07:
    description: "全国の路線バス運行経路。公共交通アクセス分析やバス停勢圏評価に用いる。"
    use_cases:
      - transportation
  N08:
    description: "空港の供用・拡張・廃港の時系列データ。空港ネットワークの発展分析に用いる。"
