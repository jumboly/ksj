    use_cases:
      - economy
  L02:
    description: "国土利用計画法施行令に基づく基準地の価格・所在地。地価公示を補完する地価指標として利用される。"
    use_cases:
      - economy
  L03-a:
    description: "1km (3 次) メッシュごとの土地利用区分 (田・建物用地・森林等 11 区分)。広域の土地利用変遷分析で標準的に用いられる。"
    use_cases:
      - land_use
  L03-b:
    description: "100m メッシュ単位の土地利用細分区分 (田・建物用地・森林等約 12 区分)。都市計画や環境アセスで詳細な土地利用を評価する際に用いる。"
    use_cases:
      - land_use
  L03-b-c:
    description: "10m メッシュ程度の高解像度土地利用区分。L03-b より詳細な利用区分で都市部の微細な土地利用評価に用いる。"
    use_cases:
      - land_use
  L03-b-u:
    description: "都市計画区域内の細分土地利用区分。都市部に特化した詳細分類で都市構造分析に用いる。"
    use_cases:
