  N11:
    description: "公共・民間のヘリポート位置。緊急医療搬送や災害対応拠点の検討で参照する。"
    use_cases:
      - transportation
      - facility
  N12:
    description: "重要物流道路指定区間。物流効率化施策や大型車通行路の検討で参照する。"
    use_cases:
      - transportation
  N13:
    description: "全国の道路センターラインデータ。道路種別 (国道・都道府県道等) や路線名を属性に持つ、道路分析の基礎データ。"
    use_cases:
