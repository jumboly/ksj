  P02:
    description: "官公庁・公的機関等の公共施設の位置。行政サービスアクセス分析で参照する。"
    use_cases:
      - facility
  P03:
    description: "火力・水力・原子力等の発電所位置・発電方式・出力。エネルギー政策や災害リスク分析で参照する。"
