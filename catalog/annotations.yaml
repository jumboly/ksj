# catalog/annotations.yaml
#
# scraper 対象外の description / use_cases をこのファイルで保持する。
# datasets.yaml は ksj catalog refresh で KSJ サイトから上書き生成されるため、
# LLM 補助生成や人手レビューで埋めた説明・用途タグを datasets.yaml に置くと
# refresh で消えてしまう。このファイルは scraper が一切触らず、loader が
# datasets.yaml と merge して Dataset オブジェクトを構築する。
#
# スキーマ:
#   datasets:
#     <code>:
#       description: "1〜3 文の要約 (Phase 12 の検索/推薦で使う)"
#       use_cases: [administrative_boundary, transportation, ...]
#
# use_cases の語彙は src/ksj/catalog/schema.py の UseCase Literal を参照。
#
# エントリが無い code は Dataset.description=None, use_cases=[] になるだけで
# エラーにはならない。LLM バッチ生成は .scratch/python/generate_descriptions.py
# を参照 (今回の Phase 9 初期投入は Claude Code が人手補助で実施)。

datasets:
  A03:
    description: "首都圏・中部圏・近畿圏の計画区域を示すポリゴン。大都市圏の範囲定義に基づく広域計画や圏域単位の集計に用いる。"
    use_cases:
      - urban_planning
  A09:
    description: "都市計画法に基づく都市計画区域 (市街化区域・市街化調整区域・非線引き) の範囲。都市計画決定状況の把握や都市化圧力分析に用いる。"
    use_cases:
      - urban_planning
      - land_use
  A10:
    description: "国立公園・国定公園・都道府県立自然公園の区域を示すポリゴン。保護保全政策の対象範囲や土地利用規制の把握に用いる。"
    use_cases:
      - land_use
  A11:
    description: "自然環境保全法に基づく原生自然環境保全地域・自然環境保全地域および都道府県自然環境保全地域の範囲。生物多様性保全や環境影響評価で参照する。"
    use_cases:
      - land_use
  A12:
    description: "農業振興地域の整備に関する法律に基づく農業振興地域および農用地区域の範囲。農地転用可否判定や農業政策の評価に用いる。"
    use_cases:
      - land_use
  A13:
    description: "森林法に基づく国有林・民有林・保安林等の森林地域の範囲。森林資源管理・林業計画・山地災害リスク評価に用いる。"
    use_cases:
      - land_use
  A15:
    description: "鳥獣保護管理法に基づく鳥獣保護区の範囲。狩猟規制や保護区内の土地利用検討に用いる。"
    use_cases:
      - land_use
  A16:
    description: "国勢調査の人口集中地区 (DID) の範囲。都市化度合いの指標、市街地定義の基準として広く利用される。"
    use_cases:
      - administrative_boundary
      - population
  A17:
    description: "過疎地域持続的発展支援特別措置法に基づく過疎地域の範囲。条件不利地域への政策対象指定状況の把握に用いる。"
    use_cases:
      - urban_planning
  A18:
    description: "半島振興法に基づく半島振興対策実施地域の範囲。地域振興政策の対象範囲を示す。"
    use_cases:
      - urban_planning
  A18s-a:
    description: "半島振興対策実施地域の範囲ポリゴンに人口・世帯数・産業分類別就業者数などの統計値を属性付与したデータ。地域振興施策の効果測定に用いる。"
    use_cases:
      - urban_planning
      - population
  A19:
    description: "離島振興法に基づく離島振興対策実施地域の範囲。離島振興施策の対象範囲を示す。"
    use_cases:
      - urban_planning
  A19s:
    description: "離島振興対策実施地域の範囲ポリゴンに人口・世帯数・産業別統計を属性付与したデータ。離島政策の効果測定に用いる。"
    use_cases:
      - urban_planning
      - population
  A20:
    description: "奄美群島振興開発特別措置法に基づく奄美群島の範囲を示すポリゴン。"
    use_cases:
      - urban_planning
  A20s:
    description: "奄美群島の範囲ポリゴンに人口・世帯数・産業別統計を属性付与したデータ。"
    use_cases:
      - urban_planning
      - population
  A21:
    description: "小笠原諸島振興開発特別措置法に基づく小笠原諸島の範囲を示すポリゴン。"
    use_cases:
      - urban_planning
  A21s:
    description: "小笠原諸島の範囲ポリゴンに人口・世帯数・産業別統計を属性付与したデータ。"
    use_cases:
      - urban_planning
      - population
  A22:
    description: "豪雪地帯対策特別措置法に基づく豪雪地帯・特別豪雪地帯の範囲。積雪対策施策の対象範囲を示す。"
    use_cases:
      - climate
      - urban_planning
  A22-m:
    description: "豪雪地帯の範囲に最深積雪平年値などの気象観測値を結合したデータ。豪雪対策や気候影響分析に用いる。"
    use_cases:
      - climate
      - disaster_risk
  A22s:
    description: "豪雪地帯の範囲ポリゴンに人口・世帯数・産業別統計を属性付与したデータ。"
    use_cases:
      - climate
      - population
  A23:
    description: "シラス・ボラ・火山灰等の特殊土壌地帯対策特別措置法に基づく指定地域の範囲。農業・土木設計・災害リスク分析で参照する。"
    use_cases:
      - land_use
      - terrain
  A24:
    description: "山村振興法に基づく振興山村の範囲。山村地域向け施策の対象把握に用いる。"
    use_cases:
