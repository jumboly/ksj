  A38:
    description: "医療法に基づく一次医療圏・二次医療圏・三次医療圏の範囲。医療資源配分や救急搬送圏の分析に用いる。"
    use_cases:
      - administrative_boundary
      - facility
  A39:
    description: "密集市街地における防災街区の整備の促進に関する法律に基づく密集市街地の範囲。防災まちづくり施策の対象把握に用いる。"
    use_cases:
      - urban_planning
      - disaster_risk
  A40:
    description: "津波防災地域づくりに関する法律に基づく津波浸水想定区域。沿岸地域の防災計画・避難計画の基礎資料。"
    use_cases:
      - flood_risk
      - disaster_risk
  A42:
    description: "古都保存法に基づく歴史的風土保存区域の範囲。景観保全・観光計画で参照する。"
    use_cases:
      - urban_planning
      - facility
  A43:
    description: "文化財保護法に基づく伝統的建造物群保存地区の範囲。歴史的景観保全や観光振興で参照する。"
    use_cases:
      - facility
      - urban_planning
  A44:
    description: "歴史まちづくり法に基づく歴史的風致維持向上計画の重点地区範囲。"
    use_cases:
      - urban_planning
  A45:
    description: "林野庁が管理する国有林野の範囲。森林資源管理や治山計画で参照する。"
    use_cases:
      - land_use
  A46:
    description: "地すべり等防止法に基づく地すべり防止区域の範囲。斜面災害リスク評価や開発規制で参照する。"
    use_cases:
      - disaster_risk
      - terrain
  A47:
    description: "急傾斜地の崩壊による災害の防止に関する法律に基づく急傾斜地崩壊危険区域の範囲。斜面災害対策や住宅開発規制で参照する。"
    use_cases:
      - disaster_risk
      - terrain
  A48:
    description: "建築基準法に基づき市町村条例で指定する災害危険区域。津波・高潮・出水による建築制限の対象範囲。"
    use_cases:
      - disaster_risk
  A49:
    description: "水防法に基づく高潮浸水想定区域。沿岸地域の防災計画や避難経路設計で参照する。"
    use_cases:
      - flood_risk
      - disaster_risk
  A50:
    description: "都市再生特別措置法に基づく立地適正化計画区域、居住誘導区域・都市機能誘導区域。コンパクトシティ施策の評価で参照する。"
    use_cases:
      - urban_planning
  A51:
    description: "水防法に基づく雨水出水浸水想定区域 (内水氾濫)。都市型水害対策で参照する。"
    use_cases:
      - flood_risk
      - disaster_risk
  A52:
    description: "砂防法に基づく砂防指定地の範囲。土砂災害対策や開発規制で参照する。"
    use_cases:
      - disaster_risk
      - terrain
  A53:
    description: "想定最大規模・計画規模など複数シナリオの洪水浸水想定区域を多段階に収録。より精緻な水害リスク評価に用いる。"
    use_cases:
